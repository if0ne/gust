services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: gust
      POSTGRES_PASSWORD: gust
      POSTGRES_DB: gust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gust -d gust"]
      interval: 5s
      timeout: 5s
      retries: 10

  gust:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://gust:gust@postgres:5432/gust
      BIND_ADDR: "0.0.0.0:8080"
      EXECUTOR_MAX_CONCURRENCY: "4"
      DEFAULT_TASK_TIMEOUT_SECONDS: "300"
      DEFAULT_TASK_MEMORY_MB: "256"
      COMPONENT_CACHE_DIR: /cache/components
      RUST_LOG: "gust=info,warn"
    volumes:
      # Persistent cache for OCI-pulled WASM components.
      - component_cache:/cache/components
      # Mount a local directory so workflows can reference local .wasm files.
      # Place your .wasm files under ./wasm/ and reference them as /wasm/<file>.wasm
      - ./wasm:/wasm:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  component_cache:
